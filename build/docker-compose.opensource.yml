version: '3.8'

services:
  atlasclaw:
    image: atlasclaw-opensource:latest
    container_name: atlasclaw
    ports:
      - "8000:8000"
    volumes:
      - ./config/atlasclaw.json:/app/atlasclaw.json:ro
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
